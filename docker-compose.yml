services:

  # ── CKAN MCP Server (già esistente, incluso per riferimento) ──────────
  ckan-mcp-server:
    build:
      context: ./ckan-mcp-server   # path alla repo che hai già
      dockerfile: Dockerfile
    image: ckan-mcp-server:latest
    container_name: ckan-mcp-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TRANSPORT: http
      PORT: 3000

  # ── Backend Node.js ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ckan-chat-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      OLLAMA_URL: http://host.docker.internal:11434   # Ollama gira sul host
      OLLAMA_MODEL: qwen2.5:7b
      MCP_URL: http://ckan-mcp-server:3000/mcp        # comunica con il container MCP
    depends_on:
      - ckan-mcp-server
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend React (prod build servito da nginx) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ckan-chat-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
